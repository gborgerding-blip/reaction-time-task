<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reaction Time Task</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .screen {
      display: none;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
    }
    .centered {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    #welcome-screen input {
      padding: 8px;
      font-size: 16px;
      margin-top: 10px;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #task-screen {
      background: #222;
    }
    #results-screen {
      padding: 20px;
      background: #ffffff;
    }
    #results-container {
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Welcome -->
  <div id="welcome-screen" class="screen centered">
    <h1>Reaction Time Task</h1>
    <p>Please enter your Participant ID, or leave blank to be assigned a random ID.</p>
    <input type="text" id="participant-id-input" placeholder="Participant ID">
    <button id="start-task-btn">Start Task</button>
  </div>

  <!-- Screen 2: Task -->
  <div id="task-screen" class="screen">
    <canvas id="task-canvas"></canvas>
  </div>

  <!-- Screen 3: Results -->
  <div id="results-screen" class="screen">
    <div id="results-container">
      <h2>Results</h2>
      <p id="summary-text"></p>
      <canvas id="histogram-canvas" width="800" height="400"></canvas>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js)"></script>

  <script>
    // === CONFIG ===
    const WEB_APP_URL = "[script.google.com](https://script.google.com/macros/s/AKfycbwxMWyePfeTEisGASOo2p9EoINbxh1lnkpoyVwHo8z0Ix5VzzUN439FYiS4Qt23_FYDjw/exec)";
    const TOTAL_TRIALS = 10;
    const CIRCLE_RADIUS = 50;
    const INTER_TRIAL_DELAY = 500; // ms

    // === STATE ===
    let participantId = null;
    let currentTrial = 0;
    let trialData = []; // { trialNumber, rt }
    let circleX = 0;
    let circleY = 0;
    let circleShownTime = null;
    let canvas, ctx;

    // === SCREEN HANDLING ===
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'flex';
    }

    function generateRandomId(length = 8) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let result = '';
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    // === TASK LOGIC ===
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function drawCircle() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(circleX, circleY, CIRCLE_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    function placeCircleRandomly() {
      const margin = CIRCLE_RADIUS + 10;
      const maxX = canvas.width - margin;
      const maxY = canvas.height - margin;
      const minX = margin;
      const minY = margin;

      circleX = Math.random() * (maxX - minX) + minX;
      circleY = Math.random() * (maxY - minY) + minY;

      drawCircle();
      circleShownTime = performance.now();
    }

    function startNextTrial() {
      if (currentTrial >= TOTAL_TRIALS) {
        endTask();
        return;
      }
      currentTrial++;
      setTimeout(placeCircleRandomly, INTER_TRIAL_DELAY);
    }

    function handleCanvasClick(event) {
      if (circleShownTime === null) return;

      const rect = canvas.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const clickY = event.clientY - rect.top;

      const dx = clickX - circleX;
      const dy = clickY - circleY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance <= CIRCLE_RADIUS) {
        const rt = performance.now() - circleShownTime;
        trialData.push({ trialNumber: currentTrial, rt: rt });
        circleShownTime = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        startNextTrial();
      }
    }

    function endTask() {
      sendTrialData()
        .then(fetchHistoricalRTs)
        .then(allRTs => {
          showResults(allRTs);
        })
        .catch(err => {
          console.error("Error in endTask:", err);
          showResults([]);
        });
    }

    // === NETWORK: POST & GET ===
    async function sendTrialData() {
      const promises = trialData.map(t => {
        const payload = {
          Participant_ID: participantId,
          Trial_Number: t.trialNumber,
          Reaction_Time: t.rt
        };
        return fetch(WEB_APP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
      });
      await Promise.all(promises);
    }

    async function fetchHistoricalRTs() {
      const response = await fetch(WEB_APP_URL);
      const data = await response.json();
      return data.map(Number).filter(v => !isNaN(v));
    }

    // === RESULTS & HISTOGRAM ===
    function computeAverageRT(trials) {
      if (trials.length === 0) return 0;
      const sum = trials.reduce((acc, t) => acc + t.rt, 0);
      return sum / trials.length;
    }

    function createHistogramData(values, binCount = 10) {
      if (values.length === 0) {
        return { labels: [], counts: [], binEdges: [] };
      }

      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;
      const binSize = range / binCount;

      const counts = new Array(binCount).fill(0);
      const binEdges = [];

      for (let i = 0; i <= binCount; i++) {
        binEdges.push(min + i * binSize);
      }

      values.forEach(v => {
        const index = Math.min(Math.floor((v - min) / binSize), binCount - 1);
        counts[index]++;
      });

      const labels = counts.map((_, i) => {
        const start = Math.round(binEdges[i]);
        const end = Math.round(binEdges[i + 1]);
        return `${start}-${end} ms`;
      });

      return { labels, counts };
    }

    function showResults(allRTs) {
      showScreen('results-screen');

      const avgRT = computeAverageRT(trialData);
      const summary = `Average Reaction Time (your trials): ${avgRT.toFixed(2)} ms`;

      document.getElementById('summary-text').textContent = summary;

      const ctxHist = document.getElementById('histogram-canvas').getContext('2d');
      const histogram = createHistogramData(allRTs);

      new Chart(ctxHist, {
        type: 'bar',
        data: {
          labels: histogram.labels,
          datasets: [{
            label: 'Reaction Times (All Participants)',
            data: histogram.counts,
            backgroundColor: 'rgba(54, 162, 235, 0.6)',
            borderColor: 'rgba(54, 162, 235, 1)',
            borderWidth: 1
          }]
        },
        options: {
          scales: {
            x: {
              title: { display: true, text: 'Reaction Time (ms)' }
            },
            y: {
              title: { display: true, text: 'Frequency' },
              beginAtZero: true
            }
          }
        }
      });
    }

    // === INIT ===
    document.getElementById('start-task-btn').addEventListener('click', () => {
      participantId = document.getElementById('participant-id-input').value.trim() || generateRandomId();
      trialData = [];
      currentTrial = 0;
      circleShownTime = null;

      showScreen('task-screen');
      canvas = document.getElementById('task-canvas');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      canvas.addEventListener('click', handleCanvasClick);
      startNextTrial();
    });

    // Start with welcome screen
    showScreen('welcome-screen');
  </script>
</body>
</html>
