<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Time Task</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    .active {
      display: flex;
    }

    #welcomeScreen, #resultScreen {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #welcomeScreen h1,
    #resultScreen h1 {
      margin-bottom: 20px;
    }

    #participantIdInput {
      padding: 12px;
      font-size: 16px;
      width: 260px;
      max-width: 80%;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 12px 22px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    button:hover {
      background: #444;
    }

    #taskScreen {
      background: white;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #taskCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: white;
      cursor: crosshair;
    }

    #taskInfo {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 18px;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #resultSummary {
      margin: 15px 0 25px 0;
      font-size: 18px;
      max-width: 700px;
      line-height: 1.5;
    }

    #chartContainer {
      width: min(900px, 90vw);
      height: min(500px, 55vh);
    }

    #statusMessage {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="welcomeScreen" class="screen active">
    <h1>Reaction Time Task</h1>
    <p>Enter your Participant ID or leave it blank to generate one automatically.</p>
    <input type="text" id="participantIdInput" placeholder="Participant ID" />
    <button id="startButton">Start Task</button>
  </div>

  <div id="taskScreen" class="screen">
    <div id="taskInfo">Trial: 0 / 10</div>
    <canvas id="taskCanvas"></canvas>
  </div>

  <div id="resultScreen" class="screen">
    <h1>Task Complete</h1>
    <div id="resultSummary">Loading your results...</div>
    <div id="chartContainer">
      <canvas id="resultsChart"></canvas>
    </div>
    <div id="statusMessage"></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxBnWHFZRYLVaw0WVpwWtFGhYrfQ38JQgUgn16_qKRUeQxWgQp5le7xhTElFdC4SGpk3g/exec";

    const TOTAL_TRIALS = 10;
    const CIRCLE_RADIUS = 50;
    const DELAY_BETWEEN_TRIALS = 500;

    const welcomeScreen = document.getElementById("welcomeScreen");
    const taskScreen = document.getElementById("taskScreen");
    const resultScreen = document.getElementById("resultScreen");
    const participantIdInput = document.getElementById("participantIdInput");
    const startButton = document.getElementById("startButton");
    const taskInfo = document.getElementById("taskInfo");
    const resultSummary = document.getElementById("resultSummary");
    const statusMessage = document.getElementById("statusMessage");

    const canvas = document.getElementById("taskCanvas");
    const ctx = canvas.getContext("2d");

    let participantId = "";
    let trialNumber = 0;
    let reactionTimes = [];
    let circleVisible = false;
    let circleX = 0;
    let circleY = 0;
    let appearanceTime = 0;
    let chartInstance = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (circleVisible) {
        drawCircle();
      }
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function showScreen(screen) {
      welcomeScreen.classList.remove("active");
      taskScreen.classList.remove("active");
      resultScreen.classList.remove("active");
      screen.classList.add("active");
    }

    function generateRandomId(length = 8) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      let id = "";
      for (let i = 0; i < length; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return id;
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function randomCirclePosition() {
      circleX = Math.random() * (canvas.width - 2 * CIRCLE_RADIUS) + CIRCLE_RADIUS;
      circleY = Math.random() * (canvas.height - 2 * CIRCLE_RADIUS) + CIRCLE_RADIUS;
    }

    function drawCircle() {
      clearCanvas();
      ctx.beginPath();
      ctx.arc(circleX, circleY, CIRCLE_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = "#1f77b4";
      ctx.fill();
      ctx.closePath();
    }

    function updateTrialInfo() {
      taskInfo.textContent = `Trial: ${trialNumber} / ${TOTAL_TRIALS}`;
    }

    function startTask() {
      participantId = participantIdInput.value.trim() || generateRandomId();
      trialNumber = 0;
      reactionTimes = [];
      showScreen(taskScreen);
      updateTrialInfo();
      setTimeout(nextTrial, 500);
    }

    function nextTrial() {
      if (trialNumber >= TOTAL_TRIALS) {
        endTask();
        return;
      }

      trialNumber++;
      updateTrialInfo();
      randomCirclePosition();
      drawCircle();
      circleVisible = true;
      appearanceTime = performance.now();
    }

    function isInsideCircle(clickX, clickY) {
      const dx = clickX - circleX;
      const dy = clickY - circleY;
      return Math.sqrt(dx * dx + dy * dy) <= CIRCLE_RADIUS;
    }

    canvas.addEventListener("click", function(event) {
      if (!circleVisible) return;

      const rect = canvas.getBoundingClientRect();
      const clickX = event.clientX - rect.left;
      const clickY = event.clientY - rect.top;

      if (!isInsideCircle(clickX, clickY)) return;

      const reactionTime = Math.round(performance.now() - appearanceTime);
      reactionTimes.push(reactionTime);

      circleVisible = false;
      clearCanvas();

      setTimeout(nextTrial, DELAY_BETWEEN_TRIALS);
    });

    async function endTask() {
      showScreen(resultScreen);

      const userAverage = Math.round(
        reactionTimes.reduce((sum, rt) => sum + rt, 0) / reactionTimes.length
      );

      resultSummary.textContent = `Participant ID: ${participantId} | Your average reaction time was ${userAverage} ms. Saving your data and loading the group distribution...`;
      statusMessage.textContent = "";

      const payload = reactionTimes.map((rt, index) => ({
        Participant_ID: participantId,
        Trial_Number: index + 1,
        Reaction_Time: rt
      }));

      try {
        await submitData(payload);
        const allHistoricalRTs = await fetchHistoricalData();
        renderHistogram(allHistoricalRTs, userAverage);

        resultSummary.textContent = `Participant ID: ${participantId} | Your average reaction time was ${userAverage} ms. The chart below shows the distribution of all recorded reaction times, with your average marked by the red line.`;
        statusMessage.textContent = "Data saved successfully.";
      } catch (error) {
        console.error(error);

        renderHistogram(reactionTimes, userAverage);
        resultSummary.textContent = `Participant ID: ${participantId} | Your average reaction time was ${userAverage} ms. Your task finished, but there was a problem loading the full historical dataset.`;
        statusMessage.textContent = "There was an issue connecting to the Google Apps Script endpoint.";
      }
    }

    async function submitData(dataArray) {
      const response = await fetch(WEB_APP_URL, {
        method: "POST",
        redirect: "follow",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(dataArray)
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch {
        return text;
      }
    }

    async function fetchHistoricalData() {
      const response = await fetch(WEB_APP_URL);
      const data = await response.json();

      if (!Array.isArray(data)) {
        throw new Error("GET request did not return an array.");
      }

      return data.map(Number).filter(n => !isNaN(n));
    }

    function buildHistogramBins(data, binSize = 50) {
      if (!data.length) {
        return {
          labels: ["0 to 49"],
          counts: [0],
          min: 0,
          max: 49,
          binSize
        };
      }

      const minValue = Math.floor(Math.min(...data) / binSize) * binSize;
      const maxValue = Math.ceil(Math.max(...data) / binSize) * binSize;

      const labels = [];
      const counts = [];

      for (let start = minValue; start < maxValue; start += binSize) {
        const end = start + binSize - 1;
        labels.push(`${start} to ${end}`);
        counts.push(0);
      }

      data.forEach(value => {
        let index = Math.floor((value - minValue) / binSize);
        if (index >= counts.length) index = counts.length - 1;
        if (index < 0) index = 0;
        counts[index]++;
      });

      return {
        labels,
        counts,
        min: minValue,
        max: maxValue,
        binSize
      };
    }

    const averageLinePlugin = {
      id: "averageLinePlugin",
      afterDatasetsDraw(chart, args, pluginOptions) {
        const avg = pluginOptions.averageValue;
        if (typeof avg !== "number") return;

        const { ctx, chartArea, scales } = chart;
        const xScale = scales.x;
        if (!xScale || !chartArea) return;

        const labels = chart.data.labels;
        const binSize = pluginOptions.binSize || 50;
        const min = pluginOptions.min || 0;

        let binIndex = (avg - min) / binSize;
        if (binIndex < 0) binIndex = 0;
        if (binIndex > labels.length) binIndex = labels.length;

        const x = xScale.left + (binIndex / labels.length) * (xScale.right - xScale.left);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "red";
        ctx.stroke();

        ctx.fillStyle = "red";
        ctx.font = "14px Arial";
        ctx.textAlign = "left";
        ctx.fillText(`Your avg: ${Math.round(avg)} ms`, x + 6, chartArea.top + 18);
        ctx.restore();
      }
    };

    function renderHistogram(allRTs, userAverage) {
      const histogram = buildHistogramBins(allRTs, 50);
      const chartCanvas = document.getElementById("resultsChart");

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(chartCanvas, {
        type: "bar",
        data: {
          labels: histogram.labels,
          datasets: [
            {
              label: "Number of trials",
              data: histogram.counts
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: {
              display: false
            },
            title: {
              display: true,
              text: "Distribution of All Recorded Reaction Times"
            },
            averageLinePlugin: {
              averageValue: userAverage,
              binSize: histogram.binSize,
              min: histogram.min
            }
          },
          scales: {
            x: {
              title: {
                display: true,
                text: "Reaction Time Bins (ms)"
              }
            },
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Frequency"
              },
              ticks: {
                precision: 0
              }
            }
          }
        },
        plugins: [averageLinePlugin]
      });
    }

    startButton.addEventListener("click", startTask);

    participantIdInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        startTask();
      }
    });
  </script>
</body>
</html>
